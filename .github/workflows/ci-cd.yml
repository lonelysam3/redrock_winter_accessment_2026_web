name: Docker Compose CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 1. 构建和测试
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker images
      run: |
        docker-compose build
    
    - name: Start services for testing
      run: |
        # 启动服务
        docker-compose up -d
        # 等待服务就绪
        sleep 30
        
        # 检查容器状态
        docker-compose ps
        
        # 健康检查 - 检查web服务是否响应
        docker-compose exec -T web curl -f http://localhost:80 || echo "Web service check failed"
        
        # 检查数据库连接
        docker-compose exec -T db mysql --user=shopping_user --password=shopping_password --execute="SHOW DATABASES;"
    
    - name: Run tests (如果有测试脚本)
      run: |
        # 如果有PHP单元测试
        if [ -f "tests/run.php" ]; then
          docker-compose exec -T web php tests/run.php
        fi
    
    - name: Cleanup
      if: always()
      run: docker-compose down -v

  # 2. 构建并推送镜像到 GitHub Container Registry
  push-to-registry:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata for Docker
      id: meta
      uses: docker/metadata-action@v4
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=sha,prefix={{branch}}-
    
    - name: Build and push web image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
    
    - name: Update docker-compose.yml with GHCR image
      run: |
        # 创建一个生产版本的docker-compose.yml
        cp docker-compose.yml docker-compose.prod.yml
        # 替换构建指令为镜像拉取
        sed -i 's|build: .|image: ghcr.io/${{ github.repository }}:latest|g' docker-compose.prod.yml
        
        # 创建部署脚本
        cat > deploy.sh << 'EOF'
        #!/bin/bash
        echo "Deploying shopping website..."
        
        # 拉取最新镜像
        docker pull ghcr.io/${{ github.repository }}:latest
        
        # 使用生产配置启动
        docker-compose -f docker-compose.prod.yml down
        docker-compose -f docker-compose.prod.yml up -d
        
        echo "Deployment completed!"
        EOF
        
        chmod +x deploy.sh
    
    - name: Create release artifacts
      uses: actions/upload-artifact@v3
      with:
        name: deployment-files
        path: |
          docker-compose.prod.yml
          deploy.sh
        retention-days: 7