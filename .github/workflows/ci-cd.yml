name: Docker Compose CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    # 1. 设置 Docker
    - name: Set up Docker
      uses: docker/setup-buildx-action@v2
    
    # 2. 安装 docker-compose
    - name: Install docker-compose
      run: |
        sudo curl -L "https://github.com/docker/compose/releases/download/v2.23.0/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose
        docker-compose --version
    
    # 3. 构建镜像
    - name: Build Docker images
      run: |
        docker-compose build
    
    # 4. 启动服务测试
    - name: Start services for testing
      run: |
        # 启动服务
        docker-compose up -d
        # 等待服务就绪
        sleep 30
        
        # 检查容器状态
        docker-compose ps
        
        # 健康检查
        curl --retry 5 --retry-delay 5 --retry-connrefused -f http://localhost:8080 || echo "Web service check failed"
        
        # 检查数据库
        docker-compose exec -T db mysql --user=shopping_user --password=shopping_password --host=db --execute="SHOW DATABASES;" shopping_db
    
    - name: Cleanup
      if: always()
      run: docker-compose down -v

  push-to-registry:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build and push web image
      uses: docker/build-push-action@v4
      with:
        context: .
        push: true
        tags: |
          ghcr.io/${{ github.repository }}:latest
          ghcr.io/${{ github.repository }}:${{ github.sha }}
