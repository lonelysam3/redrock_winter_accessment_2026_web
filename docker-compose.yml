version: '3.8'

services:
  web:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: shopping-website
    restart: always
    ports:
      - "${APP_PORT:-8080}:80"  # 使用环境变量
    volumes:
      - ./src:/var/www/html
      - uploads:/var/www/html/uploads
    environment:
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
    depends_on:
      - db
    networks:
      - shopping-network

  db:
    image: mysql:8.0
    container_name: shopping-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - shopping-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: shopping-phpmyadmin
    restart: always
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      - db
    networks:
      - shopping-network

volumes:
  db_data:
    driver: local
  uploads:
    driver: local

networks:
  shopping-network:
    driver: bridge