version: '3.8'

services:
  web:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: shopping-website
    restart: always
    ports:
      - "${APP_PORT:-8080}:80"  # 使用环境变量
    volumes:
      - ./src:/var/www/html
      - uploads:/var/www/html/uploads
    environment:
      - DB_HOST=${DB_HOST:-db}
      - DB_NAME=${DB_NAME:-shopping_db}
      - DB_USER=${DB_USER}          # 必须在 .env 中设置，无默认值
      - DB_PASSWORD=${DB_PASSWORD}  # 必须在 .env 中设置，无默认值
    depends_on:
      db:
        condition: service_healthy  # 等待数据库健康检查通过后再启动
    networks:
      - shopping-network

  db:
    image: mysql:8.0
    container_name: shopping-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}  # 必须在 .env 中设置，无默认值
      MYSQL_DATABASE: ${MYSQL_DATABASE:-shopping_db}
      MYSQL_USER: ${MYSQL_USER}                    # 必须在 .env 中设置，无默认值
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}            # 必须在 .env 中设置，无默认值
    # 不暴露 3306 端口到宿主机，仅在内部 Docker 网络中可达
    # 如需本地调试，可临时添加: ports: ["127.0.0.1:3306:3306"]
    volumes:
      - db_data:/var/lib/mysql
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # 使用 MySQL 8.0 默认的 caching_sha2_password 认证插件（比 mysql_native_password 更安全）
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_allowed_packet=64M
    healthcheck:
      # mysqladmin ping 无需凭据即可检测服务是否存活（避免密码暴露在进程列表中）
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - shopping-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: shopping-phpmyadmin
    restart: always
    ports:
      - "${PMA_PORT:-8081}:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - shopping-network

volumes:
  db_data:
    driver: local
  uploads:
    driver: local

networks:
  shopping-network:
    driver: bridge
